name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: string
      dry_run:
        description: Run the publish step in dry-run mode
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate ref
        run: |
          case "${GITHUB_REF}" in
            refs/heads/main|refs/tags/*)
              ;;
            *)
              echo "::error::This workflow must be run from the main branch or a tag. Current ref: ${GITHUB_REF}"
              exit 1
              ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Run checks
        run: vp check

      - name: Pack package
        run: vp run pack

      - name: Run tests
        run: vp test

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          publish_args=(
            .
            --access public
            --tag "${{ inputs.tag }}"
            --no-git-checks
          )

          if [ "${{ inputs.dry_run }}" = 'true' ]; then
            publish_args+=(--dry-run)
          fi

          vp pm publish "${publish_args[@]}"

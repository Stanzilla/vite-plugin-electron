name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: string
      dry_run:
        description: Run the publish step in dry-run mode
        required: true
        default: false
        type: boolean

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp pack

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          publish_args=(
            .
            --access public
            --tag "${{ inputs.tag }}"
            --publish-branch main
            --no-git-checks
          )

          if [ "${{ inputs.dry_run }}" = 'true' ]; then
            publish_args+=(--dry-run)
          fi

          vp pm publish "${publish_args[@]}"
